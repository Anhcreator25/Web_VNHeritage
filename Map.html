<!doctype html>
<html lang="vi">
<head>
    <title>Bản đồ di sản | Di sản Việt Nam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/Map.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">
                <i class="fas fa-star text-bronze me-1"></i> Viet<span class="text-bronze">Heritage</span>
            </a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link mx-2" href="Home.html">Trang chủ</a>
                    <div class="nav-item dropdown mx-2">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            Khám phá
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="Map.html"><i class="fas fa-map-marked-alt me-2"></i>Bản đồ di sản</a></li>
                            <li><a class="dropdown-item" href="Heritage.html"><i class="fas fa-building me-2"></i>Các di sản</a></li>
                        </ul>
                    </div>
                    <div class="nav-item dropdown mx-2">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown2" role="button" data-bs-toggle="dropdown">
                            Hành trình
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-book me-2"></i>Tạo lịch trình</a></li>
                        </ul>
                    </div>
                    <a class="nav-link mx-2" href="#">Bài viết</a>
                    
                </div>
            </div>
        </div>
    </nav>
    <main class="container py-5">
        <div class="page-header d-flex flex-column flex-lg-row align-items-start justify-content-between gap-3 mb-4">
            <div>
                <p class="eyebrow mb-2">Bản đồ di sản</p>
                <h1 class="page-title">Di sản vật thể & phi vật thể</h1>
                <p class="page-description mb-0">Chọn lớp di sản để xem các điểm trên bản đồ và thông tin chi tiết từ dữ liệu hiện có.</p>
            </div>
            <div class="btn-group map-toggle" role="group" aria-label="Chọn loại di sản">
                <button id="physicalBtn" type="button" class="btn btn-outline-success active">Vật thể</button>
                <button id="intangibleBtn" type="button" class="btn btn-outline-success">Phi vật thể</button>
            </div>
        </div>
        <div class="row gy-4">
            <div class="col-xl-8">
                <div class="map-panel p-3">
                    <div class="map-wrapper position-relative">
                        <img src="image/VIETNAM1.jpg" alt="Bản đồ Việt Nam" class="map-bg">
                        <div id="marker-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4">
                <aside class="info-panel p-4 shadow-sm">
                    <div class="info-image mb-4">
                        <img id="info-img" src="image/Codohue.jpg" alt="Hình di sản" />
                    </div>
                    <div class="info-title-box mb-3">
                        <span class="info-label">Chi tiết di sản</span>
                        <h2 id="info-title">Quần thể Cố đô Huế</h2>
                    </div>
                    <div class="info-meta mb-3">
                        <span id="info-location">Thừa Thiên Huế</span>
                        <span class="separator">·</span>
                        <span id="info-year">1993</span>
                    </div>
                    <div id="info-description" class="info-description"></div>
                    <div id="info-extra" class="info-extra mt-4"></div>
                </aside>
            </div>
        </div>
    </main>
    <script src="/JS/Detail_info.js"></script>
    <script src="/JS/Map.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
