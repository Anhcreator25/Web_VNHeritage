<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Di sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 bg-white p-5 rounded shadow-sm">
                <a href="Heritage.html" class="btn btn-outline-secondary mb-4">← Quay lại</a>
                
                <h1 id="h-title" class="fw-bold mb-2"></h1>
                <p class="text-muted" id="h-info"></p>
                
                <img id="h-img" src="" class="img-fluid rounded mb-4 shadow-sm" style="width: 100%; max-height: 400px; object-fit: cover;">
                
                <div id="h-content" class="lh-lg"></div>
            </div>
        </div>
    </div>

    <script src="Detail_info.js"></script>
    <script>
     
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const data = heritageData[id];

        if (data) {
            document.getElementById('h-title').innerText = data.title;
            document.getElementById('h-info').innerText = `Năm công nhận: ${data.year} | Địa điểm: ${data.location}`;
            document.getElementById('h-img').src = data.img;
            document.getElementById('h-content').innerHTML = data.content;
            document.title = data.title + " | VietHeritage";
        } else {
            document.getElementById('h-content').innerHTML = "<h3>Dữ liệu đang được cập nhật...</h3>";
        }
    </script>
</body>
</html>
